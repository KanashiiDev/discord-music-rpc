<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n="header.title | library.title" data-i18n-sep=" - ">Discord Music RPC - Activity Library</title>
    <link rel="stylesheet" href="../libs/simplebar.css" />
    <link rel="stylesheet" href="../libs/tom-select.css" />
    <link rel="stylesheet" href="library.css" />
  </head>

  <div id="bg-layer"></div>

  <body data-theme="dark">
    <div class="library-header">
      <div class="library-header-left">
        <h3 class="library-title" data-i18n="header.title | library.title" data-i18n-sep=" - ">Activity Library</h3>
        <p class="library-subtitle" data-i18n="library.subtitle">Discover activities!</p>
      </div>
      <div class="library-header-right">
        <button id="btnCheckUpdates" class="library-btn secondary" data-i18n-attr="title" data-i18n="library.checkUpdatesTooltip">
          <span data-i18n="library.checkUpdates">Check Updates</span>
          <button id="btnToggleView" class="library-btn secondary">
            <span id="btnToggleViewLabel"></span>
          </button>
        </button>
      </div>
    </div>
    <div class="content">
      <div id="updateBanner" class="update-banner" hidden>
        <span id="updateBannerText"></span>
        <button id="btnBatchUpdate" class="library-btn primary small" data-i18n="library.updateAll">Update All</button>
      </div>
      <div class="library-content" id="storeContent">
        <div id="emptyState" class="empty-state" hidden>
          <p data-i18n="library.empty.title">No repos added yet.</p>
          <small data-i18n="library.empty.hint">Add a GitHub repo below.</small>
        </div>

        <div id="repoList" class="repo-list"></div>
      </div>

      <div id="advancedSection" class="advanced-section">
        <button id="btnToggleAdvanced" class="library-btn ghost advanced-toggle">
          <span data-i18n="library.addCustomRepo">[+] Add Custom Repo (Advanced)</span>
        </button>
        <div id="addRepoPanel" class="add-repo-panel" hidden>
          <div class="add-repo-inner">
            <p class="add-repo-label" data-i18n="library.addRepo.label">GitHub Repo URL</p>
            <div class="add-repo-row">
              <input type="text" id="repoUrlInput" class="library-input" data-i18n-attr="placeholder" data-i18n="library.addRepo.placeholder" spellcheck="false" />
              <button id="btnConfirmAddRepo" class="library-btn primary small" data-i18n="library.addRepo.confirm">Add</button>
              <button id="btnCancelAddRepo" class="library-btn secondary small" data-i18n="library.addRepo.cancel">Cancel</button>
            </div>
            <span id="addRepoError" class="library-error"></span>
            <small class="add-repo-hint">
              <span data-i18n="library.addRepo.hint">Repo root must contain</span>
              <a id="exampleRepoLink" href="#" target="_blank" rel="noopener noreferrer" data-i18n="library.addRepo.exampleLink">Example format</a>
            </small>
          </div>
        </div>
      </div>

      <div id="statusBar" class="status-bar" hidden>
        <span id="statusText"></span>
      </div>
    </div>

    <script src="../libs/browser-polyfill.js"></script>
    <script src="../libs/simplebar.js"></script>
    <script src="../libs/tom-select.js"></script>
    <script src="../common/utils.js"></script>
    <script src="library.js"></script>
  </body>
</html>

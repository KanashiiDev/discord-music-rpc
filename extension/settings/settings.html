<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title data-i18n="header.title">Discord Music RPC - Settings</title>
    <link rel="stylesheet" href="settings.css" />
    <link rel="stylesheet" href="../libs/simplebar.css" />
  </head>
  <div id="bg-layer"></div>
  <body data-theme="dark">
    <div class="header">
      <div>
        <h3 data-i18n="settings.title">Discord Music RPC - Settings</h3>
        <p class="header-desc" data-i18n="settings.desc">Manage your Discord Music RPC settings!</p>
      </div>
    </div>

    <!-- Backup Section -->
    <div class="container" data-section="backup">
      <div class="content backup">
        <div class="buttons">
          <button id="exportBtn" data-i18n="backup.export">Export Backup</button>
          <button id="importBtn" data-i18n="backup.restore">Import Backup</button>
          <button id="syncBtn" data-i18n="backup.syncBtn">Sync History Between App & Extension</button>
        </div>
      </div>
    </div>

    <!-- Filters Section -->
    <div class="container" data-section="filter">
      <div class="filter-actions-header">
        <div id="filterTabsContainer"></div>
        <div>
          <button class="btn btn-primary" id="toggleFormBtn" data-i18n="filter.addNew">+ Add New Filter</button>
          <button class="btn-open-history" id="openHistoryBtn" data-i18n="button.open_history">Open History</button>
          <button class="btn btn-primary" id="getSongInfoBtn">
            <span class="btn-text" data-i18n="filter.blockCurrent">Block Current Song</span>
          </button>
        </div>
      </div>

      <div class="content filter">
        <div class="form-container" id="formContainer">
          <div class="entries-container">
            <div id="filterModeContainer"></div>
            <div id="entriesList"></div>
            <button class="btn-add-entry" id="addEntryBtn" data-i18n="filter.add">Add Entry</button>
            <button class="btn-fill-current" id="fillFormBtn" data-i18n="filter.fillWithCurrent">Fill with Current Song</button>
            <div class="all-parsers-container" id="allParsersContainer"></div>
          </div>
          <div class="parser-list" id="parserList"></div>
          <div class="form-actions">
            <button class="btn btn-save" id="saveFilterBtn" data-i18n="common.save">Save</button>
            <button class="btn btn-cancel" id="cancelBtn" data-i18n="common.cancel">Cancel</button>
          </div>
        </div>
        <div class="filters-list">
          <div id="filtersList"></div>
        </div>
      </div>
    </div>

    <!-- Debug Logs Section -->
    <div class="container" data-section="debug">
      <div class="content debug-section">
        <!-- Tab switcher -->
        <div class="debug-tab-bar">
          <button class="debug-tab-btn active" data-tab="logs" data-i18n="debug.tab.logs">Logs</button>
          <button class="debug-tab-btn" data-tab="activity" data-i18n="debug.tab.activity">Recent Activity</button>
        </div>

        <!-- Logs panel -->
        <div class="debug-panel" data-panel="logs">
          <div class="debug-toolbar">
            <div class="debug-filters">
              <button class="debug-level-btn active" data-level="all" data-i18n="common.all">All</button>
              <button class="debug-level-btn" data-level="info" data-i18n="debug.filter.info">Info</button>
              <button class="debug-level-btn" data-level="warn" data-i18n="debug.filter.warn">Warn</button>
              <button class="debug-level-btn" data-level="error" data-i18n="userscript.export.status.error">Error</button>
            </div>
            <div class="debug-actions">
              <button class="btn btn-primary" id="debugRefreshBtn" data-i18n="debug.refresh">Refresh</button>
              <button class="btn btn-primary" id="debugExportBtn" data-i18n="userscript.listControls.export">Export Logs</button>
              <button class="btn btn-danger" id="debugClearBtn" data-i18n="debug.clear">Clear Debug Logs</button>
            </div>
            <input class="debug-search" id="debugSearch" type="text" placeholder="Search logs…" data-i18n="debug.search.placeholder" />
          </div>

          <div id="summaryErrorList" class="summary-error-list"></div>

          <div class="debug-stats" id="debugStats"></div>

          <div class="debug-log-wrapper" style="position: relative; display: flex">
            <div class="debug-log-container" id="debugLogContainer" style="flex-grow: 1">
              <div class="debug-empty" id="debugEmpty" data-i18n="common.empty">Empty</div>
              <div id="debugLogList"></div>
            </div>

            <div class="debug-minimap" id="debugMinimap"></div>
          </div>
        </div>

        <!-- Activity panel -->
        <div class="debug-panel" data-panel="activity" style="display: none">
          <div class="debug-toolbar">
            <div class="debug-filters">
              <button class="debug-activity-level-btn active" data-level="all" data-i18n="common.all">All</button>
              <button class="debug-activity-level-btn" data-level="info" data-i18n="debug.filter.info">Info</button>
              <button class="debug-activity-level-btn" data-level="warn" data-i18n="debug.filter.warn">Warn</button>
              <button class="debug-activity-level-btn" data-level="error" data-i18n="userscript.export.status.error">Error</button>
            </div>
            <div class="debug-actions">
              <button class="btn btn-danger" id="activityClearBtn" data-i18n="debug.clear">Clear</button>
            </div>
            <input class="debug-search" id="activitySearch" type="text" placeholder="Search activity…" data-i18n="debug.search.placeholder" />
          </div>

          <div class="debug-stats" id="activityStats"></div>

          <div class="debug-log-container" id="activityLogContainer">
            <div class="debug-empty" id="activityEmpty" data-i18n="common.empty">Empty.</div>
            <div id="activityLogList"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="../libs/browser-polyfill.js"></script>
    <script src="../libs/simplebar.js"></script>
    <script src="../libs/pako.js"></script>
    <script src="../common/utils.js"></script>
    <script src="settings-debug.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
